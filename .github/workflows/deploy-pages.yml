name: Deploy Dashboard UI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Build
        env:
          VITE_DEFAULT_API_BASE: ${{ vars.VITE_DEFAULT_API_BASE }}
          VITE_GITHUB_CLIENT_ID: ${{ vars.VITE_GITHUB_CLIENT_ID }}
          VITE_GITHUB_TASK_REPO: ${{ vars.VITE_GITHUB_TASK_REPO }}
          VITE_GITHUB_OAUTH_SCOPES: ${{ vars.VITE_GITHUB_OAUTH_SCOPES }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
